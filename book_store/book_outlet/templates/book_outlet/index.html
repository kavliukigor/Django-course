{%extends 'book_outlet/base.html'%}

{%block title%}
    All books
{%endblock%}

{%block content%}
<ul>
    {%for book in books%}
        <li><a href="{{book.get_absolute_url}}">{{book.title}}</a>(Rating:{{book.rating}})</li>
    {%endfor%}
</ul>  
<hr>

<p>Total number:{{total_number_of_books}}</p>
<p>Average rating:{{average_rating}}</p>
{%endblock%}
